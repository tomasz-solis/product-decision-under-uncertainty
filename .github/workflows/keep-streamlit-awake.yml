name: Keep Streamlit awake

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-streamlit-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      STREAMLIT_APP_URL: ${{ vars.STREAMLIT_APP_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check configuration
        run: |
          if [ -z "${STREAMLIT_APP_URL}" ]; then
            echo "Missing repository variable STREAMLIT_APP_URL."
            echo "Set it to your deployed app URL, for example https://your-app-name.streamlit.app/."
            exit 1
          fi

      - name: Wake or verify Streamlit app
        run: python -u scripts/keep_streamlit_awake.py
