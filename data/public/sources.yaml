sources:
  - source_id: hm_land_registry_search_completion_benchmark
    file_name: hm_land_registry_search_completion_benchmark.csv
    source_url: https://www.gov.uk/csv-preview/661665c11a70cf4b92093184/Live_Service_DataGov_stats_.csv
    publication: HM Land Registry live service completion-rate data
    license: Open Government Licence v3.0
    extraction_date: 2026-04-06
    grain: monthly_public_service_completion_rate
    expected_schema:
      date: date
      service_name: category
      completion_rate: float
      failure_rate: float
    allowed_values:
      service_name:
        - Search (gov)
    minimum_row_count: 12
    primary_key_columns:
      - date
      - service_name
