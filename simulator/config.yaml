  baseline_failure_rate:
    dist: tri
    low: 0.04
    mode: 0.10
    high: 0.15

  failure_to_churn_rel:
    dist: tri
    low: 0.10
    mode: 0.15
    high: 0.25

  cost_per_failure_eur:
    dist: tri
    low: 20.0
    mode: 35.0
    high: 55.0

  value_per_success_eur:
    dist: tri
    low: 28.0
    mode: 35.0
    high: 45.0

  stabilize_failure_reduction:
    dist: tri
    low: 0.40
    mode: 0.60
    high: 0.80

  extension_uptake:
    dist: tri
    low: 0.10
    mode: 0.30
    high: 0.50

  extension_exposure_reduction:
    dist: tri
    low: 0.55
    mode: 0.70
    high: 0.85

  extension_value_per_uptake_eur:
    dist: tri
    low: 2.0
    mode: 4.0
    high: 7.0

  extension_loss_rate:
    dist: tri
    low: 0.05
    mode: 0.08
    high: 0.12

  new_capability_uplift:
    dist: tri
    low: 0.05
    mode: 0.08
    high: 0.15

  regression_event_prob:
    dist: tri
    low: 0.05
    mode: 0.15
    high: 0.25

  regression_event_cost_eur:
    dist: lognormal
    median: 150000.0
    p95: 300000.0

  stabilize_core_regression_prob_multiplier:
    dist: constant
    value: 1.0

  feature_extension_regression_prob_multiplier:
    dist: constant
    value: 0.8

  new_capability_regression_prob_multiplier:
    dist: constant
    value: 2.5

  stabilize_core_upfront_cost_eur:
    dist: constant
    value: 800000.0

  stabilize_core_annual_maintenance_cost_eur:
    dist: constant
    value: 30000.0

  feature_extension_upfront_cost_eur:
    dist: constant
    value: 600000.0

  feature_extension_annual_maintenance_cost_eur:
    dist: constant
    value: 60000.0

  new_capability_upfront_cost_eur:
