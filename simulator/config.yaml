# simulator/config.yaml
project:
  seed: 42
  model_version: "5.0.0"

simulation:
  n_worlds: 20000
  annual_volume: 250000
  time_horizon_years: 2
  discount_rate_annual: 0.08
  scenario: mid_range_pressure

decision_policy:
  name: guardrailed_expected_value
  minimum_p05_value_eur: -300000.0
  maximum_mean_regret_eur: 450000.0
  ev_tolerance_eur: 100000.0

analysis:
  sensitivity_materiality_threshold_abs_spearman: 0.10
  sensitivity_max_rows_per_option: 3
  decision_boundary_top_parameters: 3

dependencies:
  method: gaussian_copula
  rank_correlations:
    baseline_failure_rate:
      cost_per_failure_eur: 0.55
      failure_to_churn_rel: 0.60
    extension_uptake:
      extension_value_per_uptake_eur: 0.40
    regression_event_prob:
      regression_event_cost_eur: 0.45

scenarios:
  mid_range_pressure:
    label: Mid-range pressure
    description: Reliability pressure is meaningful, but the business is not yet in a crisis state.
    parameter_overrides: {}
    simulation_overrides: {}

  reliability_crisis:
    label: Reliability crisis
    description: Reliability pain intensifies, drift gets costlier, and delivery gets harder.
    parameter_overrides:
      baseline_failure_rate:
        low: 0.08
        mode: 0.14
        high: 0.20
      failure_to_churn_rel:
        low: 0.12
        mode: 0.18
        high: 0.28
      cost_per_failure_eur:
        low: 25.0
        mode: 40.0
        high: 65.0
      value_per_success_eur:
        low: 24.0
        mode: 32.0
        high: 40.0
      stabilize_failure_reduction:
        low: 0.35
        mode: 0.50
        high: 0.65
      extension_uptake:
        low: 0.08
        mode: 0.18
        high: 0.30
      extension_exposure_reduction:
        low: 0.50
        mode: 0.60
        high: 0.75
      new_capability_uplift:
        low: 0.03
        mode: 0.06
        high: 0.10
      regression_event_prob:
        low: 0.10
        mode: 0.18
        high: 0.28
      regression_event_cost_eur:
        dist: lognormal
        median: 200000.0
        p95: 450000.0
      do_nothing_drift_cost_eur:
        low: 50000.0
        mode: 80000.0
        high: 120000.0
      stabilize_core_launch_delay_months:
        low: 4.0
        mode: 7.0
        high: 10.0
      stabilize_core_cost_overrun_multiplier:
        low: 1.10
        mode: 1.25
        high: 1.50
      feature_extension_launch_delay_months:
        low: 2.0
        mode: 3.0
        high: 5.0
      feature_extension_cost_overrun_multiplier:
        low: 1.05
        mode: 1.15
        high: 1.35
      new_capability_launch_delay_months:
        low: 5.0
        mode: 8.0
        high: 12.0
      new_capability_cost_overrun_multiplier:
        low: 1.15
        mode: 1.35
        high: 1.70
    simulation_overrides:
      annual_volume: 220000

  growth_friendly_recovery:
    label: Growth-friendly recovery
    description: Economics strengthen, reliability pressure eases, and delivery conditions improve.
    parameter_overrides:
      baseline_failure_rate:
        low: 0.02
        mode: 0.06
        high: 0.10
      failure_to_churn_rel:
        low: 0.08
        mode: 0.12
        high: 0.22
      cost_per_failure_eur:
        low: 18.0
        mode: 30.0
        high: 45.0
      value_per_success_eur:
        low: 32.0
        mode: 40.0
        high: 50.0
      stabilize_failure_reduction:
        low: 0.55
        mode: 0.70
        high: 0.85
      extension_uptake:
        low: 0.25
        mode: 0.35
        high: 0.55
      extension_exposure_reduction:
        low: 0.70
        mode: 0.80
        high: 0.92
      new_capability_uplift:
        low: 0.08
        mode: 0.12
        high: 0.18
      regression_event_prob:
        low: 0.03
        mode: 0.08
        high: 0.15
      regression_event_cost_eur:
        dist: lognormal
        median: 100000.0
        p95: 220000.0
      do_nothing_drift_cost_eur:
        low: 20000.0
        mode: 40000.0
        high: 70000.0
      stabilize_core_launch_delay_months:
        low: 2.0
        mode: 4.0
        high: 6.0
      stabilize_core_cost_overrun_multiplier:
        low: 0.95
        mode: 1.05
        high: 1.20
      feature_extension_launch_delay_months:
        low: 1.0
        mode: 2.0
        high: 3.0
      feature_extension_cost_overrun_multiplier:
        low: 0.95
        mode: 1.05
        high: 1.15
      new_capability_launch_delay_months:
        low: 3.0
        mode: 5.0
        high: 8.0
      new_capability_cost_overrun_multiplier:
        low: 1.00
        mode: 1.10
        high: 1.35
    simulation_overrides:
      annual_volume: 300000

